<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JGDL Games</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="launcher">
    <h1>JGDL Games</h1>
    <p class="subtitle">Choose a game to play</p>
    <div id="game-cards">
      <a href="popcorn.html" class="game-card" id="card-popcorn">
        <span class="game-icon game-icon-logo">
          <img src="assets/popcorn/logo.png" alt="Super Popcorn Machine" />
        </span>
        <p>Two pans, match popcorn by color. Keep the balance!</p>
      </a>
      <a href="hello.html" class="game-card" id="card-hello">
        <span class="game-icon game-icon-logo">
          <img src="assets/hello/logo.png" alt="Hello!" />
        </span>
        <p>Single board, match phones by color. Clear before the board fills!</p>
      </a>
    </div>
  </div>
</body>
</html>
